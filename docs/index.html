<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PIXM User Manual</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="My Documentation" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <!-- Docsify Themeable (replaces the default theme with a clean, customisable one) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
      title="Simple"
    />

    <!-- Your custom overrides — edit assets/css/theme-custom.css -->
    <link rel="stylesheet" href="assets/css/theme-custom.css" />

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon/favicon.ico" />

    <!-- Alternate themes (available via the theme switcher if you add one) -->
    <link
      rel="stylesheet alternate"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-defaults.css"
      title="Defaults"
    />
    <link
      rel="stylesheet alternate"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css"
      title="Simple Dark"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/@fortawesome/fontawesome-free/css/fontawesome.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@fortawesome/fontawesome-free/css/brands.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@fortawesome/fontawesome-free/css/regular.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@fortawesome/fontawesome-free/css/solid.css"
    />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "PIXM User Manual",
        logo: "assets/media/Primary_PIXM_BlackText.png",
        repo: "https://github.com/PDCAero/pixm-user-manual",
        homepage: "home.md",
        loadSidebar: true,
        loadNavbar: true,

        // SIDEBAR NAVIGATION
        auto2top: true,
        maxLevel: 2, // heading depth shown in sidebar
        subMaxLevel: 2, // auto-generate sub-headings under each page
        externalLinkTarget: "_blank",

        // PLUGINS
        search: {
          depth: 9,
          noData: "No matches found.",
          placeholder: "Search...",
        },
        pagination: {
          crossChapter: true,
          crossChapterText: true,
        },
      };
    </script>

    <!-- Core -->
    <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>

    <!-- Docsify Themeable -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0"></script>

    <!-- Search -->
    <script src="https://unpkg.com/docsify/lib/plugins/search.min.js"></script>

    <!-- Emoji  :tada: etc. -->
    <script src="https://unpkg.com/docsify/lib/plugins/emoji.min.js"></script>

    <!-- Font Awesome  :fas fa-plane: etc. -->
    <script src="https://unpkg.com/docsify-fontawesome/dist/docsify-fontawesome.min.js"></script>

    <!-- Tabs   <!-- tabs:start -->
    syntax -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>

    <!-- Click-to-zoom images -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

    <!-- Prev / Next pagination -->
    <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>

    <!-- Mermaid diagrams -->
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
      mermaid.initialize({ startOnLoad: true });
      window.mermaid = mermaid;
    </script>
    <script src="//unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
  </body>
</html>
